<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案 A：3D 宫殿漫游 Demo - 记忆宫殿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }

    #ui h1 {
      color: white;
      font-size: 24px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
      pointer-events: auto;
    }

    #controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 15px 30px;
      border-radius: 30px;
      color: white;
      text-align: center;
      z-index: 100;
      border: 1px solid rgba(255,255,255,0.2);
    }

    #controls p {
      font-size: 14px;
      margin-bottom: 5px;
    }

    #controls .keys {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }

    #controls kbd {
      background: rgba(255,255,255,0.2);
      padding: 5px 12px;
      border-radius: 5px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    #memory-panel {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid rgba(138, 43, 226, 0.3);
      padding: 30px;
      transition: right 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
      overflow-y: auto;
    }

    #memory-panel.active {
      right: 0;
    }

    #memory-panel h2 {
      color: #e94560;
      font-size: 24px;
      margin-bottom: 20px;
    }

    #memory-panel .content {
      color: rgba(255,255,255,0.8);
      line-height: 1.8;
      margin-bottom: 20px;
    }

    #memory-panel .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    #memory-panel .tag {
      background: rgba(138, 43, 226, 0.3);
      color: #c77dff;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
    }

    #memory-panel .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s;
    }

    #memory-panel .close-btn:hover {
      background: rgba(233, 69, 96, 0.5);
    }

    #start-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: white;
      text-align: center;
    }

    #start-overlay h1 {
      font-size: 48px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #e94560, #8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #start-overlay p {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    #start-btn {
      background: linear-gradient(135deg, #e94560, #8a2be2);
      border: none;
      color: white;
      padding: 15px 50px;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4);
    }

    .room-label {
      position: absolute;
      color: white;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    .memory-hint {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(138, 43, 226, 0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .memory-hint.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- 开始界面 -->
  <div id="start-overlay">
    <h1>🏰 3D 宫殿漫游 Demo</h1>
    <p>第一人称视角探索你的记忆宫殿</p>
    <button id="start-btn">进入宫殿</button>
  </div>

  <!-- UI -->
  <div id="ui">
    <h1>🏰 记忆宫殿 - 方案 A Demo</h1>
  </div>

  <!-- 控制提示 -->
  <div id="controls">
    <p>🕹️ 操作说明</p>
    <div class="keys">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
      <span>移动</span>
    </div>
    <div class="keys" style="margin-top: 8px;">
      <kbd>←</kbd><kbd>→</kbd>
      <span>转向</span>
    </div>
    <div class="keys" style="margin-top: 8px;">
      <kbd>E</kbd>
      <span>查看记忆</span>
    </div>
  </div>

  <!-- 记忆提示 -->
  <div class="memory-hint" id="memory-hint">
    按 E 查看记忆
  </div>

  <!-- 记忆面板 -->
  <div id="memory-panel">
    <button class="close-btn" onclick="closeMemory()">×</button>
    <h2 id="memory-title">记忆标题</h2>
    <div class="tags" id="memory-tags"></div>
    <div class="content" id="memory-content">记忆内容...</div>
  </div>

  <!-- 3D 场景 -->
  <div id="canvas"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js';

    // 场景设置
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('canvas').appendChild(renderer.domElement);

    // 灯光
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xe94560, 1, 50);
    pointLight.position.set(0, 10, 0);
    pointLight.castShadow = true;
    scene.add(pointLight);

    // 地板
    const floorGeometry = new THREE.PlaneGeometry(50, 50);
    const floorMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x16213e,
      roughness: 0.8,
      metalness: 0.2
    });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 创建房间
    const rooms = [
      { id: 1, name: '英语学习', x: 0, z: -10, color: 0x8a2be2 },
      { id: 2, name: '历史知识', x: -12, z: 5, color: 0xe94560 },
      { id: 3, name: '科学技术', x: 12, z: 5, color: 0x00d9ff }
    ];

    const roomMeshes = [];

    rooms.forEach(room => {
      // 房间墙体
      const roomGeometry = new THREE.BoxGeometry(8, 6, 8);
      const roomMaterial = new THREE.MeshStandardMaterial({ 
        color: room.color,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
      });
      const roomMesh = new THREE.Mesh(roomGeometry, roomMaterial);
      roomMesh.position.set(room.x, 3, room.z);
      roomMesh.castShadow = true;
      scene.add(roomMesh);
      roomMeshes.push({ mesh: roomMesh, room });

      // 房间入口（门）
      const doorGeometry = new THREE.PlaneGeometry(3, 4);
      const doorMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xffffff,
        emissive: room.color,
        emissiveIntensity: 0.5
      });
      const door = new THREE.Mesh(doorGeometry, doorMaterial);
      door.position.set(room.x, 2, room.z + 4);
      scene.add(door);

      // 房间标签
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = 256;
      canvas.height = 64;
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(room.name, 128, 40);
      
      const texture = new THREE.CanvasTexture(canvas);
      const labelMaterial = new THREE.SpriteMaterial({ map: texture });
      const label = new THREE.Sprite(labelMaterial);
      label.position.set(room.x, 7, room.z);
      label.scale.set(4, 1, 1);
      scene.add(label);
    });

    // 创建记忆物体（悬浮在房间前）
    const memories = [
      { id: 1, roomId: 1, title: 'apple - 苹果', content: '名词，指一种常见的水果，也是科技公司的名字。', tags: ['英语', '词汇', '基础'], x: 0, z: -6 },
      { id: 2, roomId: 1, title: 'banana - 香蕉', content: '名词，长条形的黄色水果，富含钾元素。', tags: ['英语', '词汇', '水果'], x: 3, z: -6 },
      { id: 3, roomId: 2, title: '秦始皇', content: '中国第一个皇帝，统一六国，建立秦朝。', tags: ['历史', '中国', '皇帝'], x: -12, z: 1 },
      { id: 4, roomId: 3, title: '量子力学', content: '物理学分支，研究微观粒子的运动规律。', tags: ['科学', '物理', '前沿'], x: 12, z: 1 }
    ];

    const memoryMeshes = [];

    memories.forEach(mem => {
      // 记忆物体（悬浮的水晶）
      const geometry = new THREE.OctahedronGeometry(0.5);
      const material = new THREE.MeshStandardMaterial({ 
        color: 0xffffff,
        emissive: 0x8a2be2,
        emissiveIntensity: 0.8,
        metalness: 0.9,
        roughness: 0.1
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(mem.x, 1.5, mem.z);
      mesh.castShadow = true;
      scene.add(mesh);
      memoryMeshes.push({ mesh, mem });

      // 添加点光源
      const memoryLight = new THREE.PointLight(0x8a2be2, 0.5, 5);
      memoryLight.position.set(mem.x, 1.5, mem.z);
      scene.add(memoryLight);
    });

    // 玩家控制
    let player = {
      x: 0,
      y: 1.6,
      z: 8,
      rotation: 0
    };

    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      
      // E 键查看记忆
      if (e.key.toLowerCase() === 'e') {
        checkMemoryInteraction();
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // 鼠标转向
    let mouseX = 0;
    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === renderer.domElement) {
        mouseX = e.movementX * 0.002;
      }
    });

    // 点击进入指针锁定
    renderer.domElement.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });

    // 开始按钮
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('start-overlay').style.display = 'none';
      renderer.domElement.requestPointerLock();
    });

    // 更新玩家位置
    function updatePlayer() {
      const speed = 0.1;
      const rotSpeed = 0.04;

      player.rotation += mouseX;
      mouseX = 0;

      if (keys['w']) {
        player.x -= Math.sin(player.rotation) * speed;
        player.z -= Math.cos(player.rotation) * speed;
      }
      if (keys['s']) {
        player.x += Math.sin(player.rotation) * speed;
        player.z += Math.cos(player.rotation) * speed;
      }
      if (keys['a']) {
        player.x -= Math.cos(player.rotation) * speed;
        player.z += Math.sin(player.rotation) * speed;
      }
      if (keys['d']) {
        player.x += Math.cos(player.rotation) * speed;
        player.z -= Math.sin(player.rotation) * speed;
      }
      if (keys['arrowleft']) {
        player.rotation -= rotSpeed;
      }
      if (keys['arrowright']) {
        player.rotation += rotSpeed;
      }

      camera.position.set(player.x, player.y, player.z);
      camera.rotation.y = player.rotation;
    }

    // 检查记忆交互
    function checkMemoryInteraction() {
      let nearestMemory = null;
      let minDistance = 3;

      memoryMeshes.forEach(({ mesh, mem }) => {
        const distance = camera.position.distanceTo(mesh.position);
        if (distance < minDistance) {
          nearestMemory = mem;
          minDistance = distance;
        }
      });

      if (nearestMemory) {
        showMemory(nearestMemory);
      }
    }

    // 显示记忆面板
    window.showMemory = function(mem) {
      document.getElementById('memory-title').textContent = mem.title;
      document.getElementById('memory-content').textContent = mem.content;
      
      const tagsContainer = document.getElementById('memory-tags');
      tagsContainer.innerHTML = mem.tags.map(tag => 
        `<span class="tag">#${tag}</span>`
      ).join('');
      
      document.getElementById('memory-panel').classList.add('active');
      document.exitPointerLock();
    }

    // 关闭记忆面板
    window.closeMemory = function() {
      document.getElementById('memory-panel').classList.remove('active');
      renderer.domElement.requestPointerLock();
    }

    // 动画循环
    function animate() {
      requestAnimationFrame(animate);

      updatePlayer();

      // 记忆物体旋转动画
      memoryMeshes.forEach(({ mesh }, i) => {
        mesh.rotation.y += 0.02;
        mesh.rotation.z += 0.01;
        mesh.position.y = 1.5 + Math.sin(Date.now() * 0.001 + i) * 0.2;
      });

      // 检查最近的记忆，显示提示
      let showHint = false;
      memoryMeshes.forEach(({ mesh }) => {
        if (camera.position.distanceTo(mesh.position) < 3) {
          showHint = true;
        }
      });
      document.getElementById('memory-hint').classList.toggle('visible', showHint);

      renderer.render(scene, camera);
    }

    animate();

    // 窗口大小调整
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
